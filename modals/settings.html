<div class="modal-content">
  <h2>Paramètres de la campagne</h2>

  <div class="form-group">
    <h3>🔴 Supprimer la campagne</h3>
    <button class="btn btn-danger" id="delete-campaign">Supprimer la campagne</button>
  </div>

  <div class="form-group">
    <h3>👤 Gérer un affilié</h3>
    <label for="affiliate-select">Sélectionner un affilié :</label>
    <select id="affiliate-select">
      <option value="">-- Choisir un affilié --</option>
    </select>

    <label for="commission-value">Commission :</label>
    <input type="text" id="commission-value" placeholder="Ex : 10 ou 10%" />

    <div style="display: flex; gap: 10px; margin-top: 10px;">
      <button class="btn" id="update-affiliate">Mettre à jour</button>
      <button class="btn btn-danger" id="delete-affiliate">Supprimer</button>
    </div>
  </div>
</div>
