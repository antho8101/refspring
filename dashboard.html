<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RefSpring – Dashboard</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap');
  </style>
  <script type="module" src="js/dashboard.js"></script>
  <script type="module" src="js/affiliate.js"></script>
</head>
<body>
  <div class="dashboard-container">

    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="logo-container">
          <img src="assets/mingcute_link-fill.svg" alt="Logo RefSpring" width="24" height="24" />
          <span class="logo-text">REFSPRING</span>
        </div>

        <button class="btn" id="createCampaignBtn">
          <img src="assets/mingcute_plus-fill.svg" alt="+" width="16" height="16" />
          Créer une campagne
        </button>

        <div class="campaign-section">
          <p class="campaign-title">Campagnes</p>
          <div class="separator"></div>
          <ul class="campaign-list" id="campaign-list"></ul>
        </div>
      </div>

      <div class="sidebar-bottom">
        <div class="separator"></div>
        <span class="user-email">contact@refspring.com</span>
        <button class="btn wide-btn" id="logoutBtn">
          <img src="assets/mingcute_open-door-line.svg" alt="Se déconnecter" width="16" height="16" />
          Se déconnecter
        </button>
      </div>
    </aside>

    <main class="dashboard-main" id="dashboard-main">
  <!-- Dynamique : stat bloc ou message vide -->
</main>

  </div>

  <!-- Conteneur de modale -->
  <div id="modalContainer" class="modal-overlay"></div>
</body>
</html>
